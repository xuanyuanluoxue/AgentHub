# 模型配置模板
# 复制此文件并填入你的配置

# 默认模型
default_model: "[模型名称]"

# 模型列表
models:
  - name: "[模型名称]"
    provider: "[Provider名称]"
    id: "[模型ID]"
    max_tokens: 8192
    temperature: 0.7
    description: "[模型描述]"
    
  - name: "[另一个模型]"
    provider: "[Provider名称]"
    id: "[模型ID]"
    max_tokens: 4096
    temperature: 0.5
    description: "[模型描述]"

# Provider 配置
providers:
  - name: "[Provider名称]"
    api_key: "[API密钥]"  # 实际使用时从环境变量读取
    base_url: "[API地址]"
    
  - name: "[另一个Provider]"
    api_key: "[API密钥]"
    base_url: "[API地址]"

# 设置
settings:
  timeout: 30000
  retry_attempts: 3
  auto_load_default: true